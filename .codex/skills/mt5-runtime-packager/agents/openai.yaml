  short_description: "Package MT5 EXEs as minimal direct-run operator folders."
  default_prompt: "Use $mt5-runtime-packager to package or audit an MT5 Python runtime EXE with a minimal operator deliverable (one runnable EXE, beside-EXE config.ini, empty logs folder, optional empty data_cache only if needed), no BAT/CMD/PS1 wrappers in the final folder, offline/static build checks, optional explicit MT5 runtime smoke, cost-inclusive position sizing, spread-aware pending-order prices, duplicate-signal-bar blocking, reconciliation logs, demo-only safety gates, and portable direct-launch behavior."
