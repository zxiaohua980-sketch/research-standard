interface:
  display_name: "Quant Research"
  short_description: "Three-phase MT5/FX research pipeline for exploration, candidate iteration, and demo runtime handoff."
  default_prompt: "Use quant-research to classify this MT5 FX task into exploration, candidate iteration, or runtime packaging, then apply the right audit and evidence labels."
metadata:
  version: "1.3.0"
  purpose: "Support fast exploratory strategy research while preserving decision-grade governance for candidate versions, OOS boundaries, bar-by-bar replay, and MT5 dry-run/demo runtime handoff."
  applies_to:
    - "exploratory alpha hypothesis testing"
    - "quick strategy coding and fatal audit"
    - "win-rate and risk-reward testing"
    - "MFE/MAE and winner/loss attribution"
    - "MT5 OHLC and tick research"
    - "FX event studies"
    - "strategy backtest reviews"
    - "candidate version iteration"
    - "bar-by-bar replay validation"
    - "market microstructure and liquidity sweep research"
    - "walk-forward and OOS validation"
    - "lookahead and survivorship audits"
    - "strategy attribution and freeze management"
    - "runtime handoff for dry-run/demo EXE packaging"
    - "machine-readable data ledger guards"
    - "frozen baseline registry checks"
    - "research stage gate checks"
    - "Chinese diagnostic research reports"
  excludes:
    - "unlabeled alpha claims"
    - "hidden parameter optimization"
    - "OOS or forward claims from exploratory tests"
    - "broker order placement"
    - "REAL-account trading"
    - "EA live trading code generation"
    - "strategy recommendations without audit evidence"
