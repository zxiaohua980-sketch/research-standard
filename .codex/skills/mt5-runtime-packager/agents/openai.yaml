interface:
  display_name: "MT5 Runtime Packager"
  short_description: "Package MT5 EXEs as minimal direct-run operator folders."
  default_prompt: "Use $mt5-runtime-packager to package or audit an MT5 Python runtime EXE with a minimal operator deliverable (one runnable EXE, beside-EXE config.ini, empty logs folder, optional empty data_cache only if needed), no BAT/CMD/PS1 wrappers in the final folder, offline/static build checks, immediate post-package EXE smoke and log-error check, MT5 bid/ask-correct market/open entries, explicit spread source/sign handling, Buy Stop/Sell Stop and SL/TP spread handling, pending-too-close tick monitoring with market conversion when triggered, cost-inclusive position sizing, duplicate-signal-bar blocking, reconciliation logs, demo-only safety gates, and portable direct-launch behavior."
metadata:
  version: "1.1.5"
  purpose: "Package and audit MT5 Python runtimes as minimal portable operator EXE folders with immediate post-package EXE smoke/log checks, exact MT5 bid/ask entry and SL/TP spread source/sign handling, pending-too-close tick monitoring with market conversion when triggered, external config, empty delivery logs, no final BAT/CMD/PS1 wrappers, offline/static package checks, explicit runtime-only MT5 account/magic snapshots, cost-inclusive risk sizing, persistent signal execution ledgers, reconciliation, and demo-only safety."
