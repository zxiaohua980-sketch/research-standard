; MT5 runtime config template — cost-inclusive risk + spread-aware pending orders
; Keep this file beside the EXE. Do not bake these values into the binary.

[identity]
strategy_id =
runtime_id =
instance_name =
environment_id = demo
magic_number =
comment_prefix =
mt5_comment_max_length = 16

[runtime]
mode = dry_run
; refresh_seconds controls closed-bar signal scans/status, not pending trigger management.
refresh_seconds = 60
pending_monitor_mode = tick
tick_poll_interval_ms = 250
terminal_path =
timezone = broker
console_live_output = true

[runtime_smoke]
; Offline packaging must not open MT5. These settings apply only when the user
; intentionally runs source/EXE smoke or DEMO order tests.
run_mt5_smoke_on_build = false
expected_account_server =
expected_login =
print_account_magic_snapshot = true
write_account_magic_snapshot = true
require_trade_allowed_for_orders = true
require_zero_magic_positions_before_smoke = false
require_zero_magic_orders_before_smoke = false

[market_data]
data_source = mt5_api
bars_to_keep = 3000
cache_refresh_bars = 200
data_cache_dir = .\data_cache
exclude_current_bar = true
atomic_cache_write = true

[risk]
risk_cash_per_order = 100
position_sizing_mode = cost_inclusive_risk_cash
include_commission_in_risk = true
commission_per_lot_round_turn_usd = 7.0
commission_free_symbols = XAUUSD,BTCUSD
include_spread_in_risk = true
; Live/demo order-capable default: use current broker spread at order decision time.
; spread_price = symbol_info_tick(symbol).ask - symbol_info_tick(symbol).bid
; Deterministic dry-run/backtest diagnostics may set spread_source=fixed_points.
spread_source = mt5_tick
spread_fallback_source = fixed_points
fixed_spread_points_default =
include_slippage_in_risk = true
slippage_points_entry = 0
slippage_points_exit = 0
volume_rounding = floor_to_step
max_risk_overshoot_pct = 0
max_volume_per_order =
max_total_volume =

[orders]
order_enabled = false
entry_execution_mode = market
market_entry_price_policy = broker_tick_side_no_manual_spread
market_entry_use_tick_side = true
spread_adjust_market_entry = false
; Use actual_fill_no_extra_spread when entry-to-SL risk is calculated from broker executable side
; such as BUY ask / SELL bid. Use raw_chart_add_spread_cost only when risk uses raw bid-chart levels.
spread_risk_accounting = actual_fill_no_extra_spread
signal_price_basis = broker_trigger_side
pending_price_policy = broker_trigger_side
sltp_price_policy = broker_exit_trigger_side
spread_price_source = mt5_tick
require_chart_mode_match = true
; Live EXE default: raw entry/SL/TP are already MT5 trigger-side prices.
; BUY_STOP/BUY_LIMIT raw_entry = desired Ask trigger.
; SELL_STOP/SELL_LIMIT raw_entry = desired Bid trigger.
; BUY SL/TP raw levels = desired Bid exit triggers.
; SELL SL/TP raw levels = desired Ask exit triggers.
; If raw levels are explicitly Bid-chart/bar levels, switch policies to broker_bidask_from_bid_chart.
live_quote_source = mt5_symbol_info_tick
require_fresh_tick_before_order = true
max_tick_age_ms = 2000
adjust_buy_pending_entry_for_spread = false
adjust_sell_pending_entry_for_spread = false
adjust_buy_sltp_for_spread = false
adjust_sell_sltp_for_spread = false
reject_if_adjusted_sl_invalid = true
min_pending_distance_points_buffer = 0
pending_too_close_policy = wait_until_valid_or_market_if_triggered
market_if_pending_triggered = true
pending_reprice_to_min_distance = false
pending_retry_on_invalid_price = true
max_market_conversion_chase_points =
pending_expire_bars = 1
pending_expire_minutes = 0
cancel_stale_pending = true
max_positions_total = 1
max_positions_per_symbol = 1
max_new_orders_per_cycle = 1

[duplicate_signal_guard]
signal_execution_ledger_path = .\logs\signal_execution_ledger.jsonl
signal_key_fields = strategy_id,symbol,timeframe,signal_bar_time,side,setup_id
consume_signal_before_order_send = true
block_duplicate_signal_bar = true
duplicate_scope = symbol_timeframe_side_magic

[reconciliation]
reconcile_on_startup = true
reconcile_each_cycle = true
recovery_lookback_days = 7
history_future_buffer_hours = 12
order_confirm_timeout_seconds = 30
order_confirm_poll_interval_seconds = 2
unknown_freeze_new_orders = true

[logging]
log_dir = .\logs
runtime_log_enabled = true
error_log_enabled = true
reconciliation_log_enabled = true
order_journal_enabled = true
position_snapshot_enabled = true
runtime_event_jsonl = .\logs\runtime_events.jsonl

[safety]
kill_switch = false
allow_demo_trade = false
allow_live_trade = false
dry_run_enforce = true
