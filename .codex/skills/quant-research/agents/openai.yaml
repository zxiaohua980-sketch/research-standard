interface:
  display_name: "Quant Research"
  short_description: "MT5/FX research pipeline with version isolation and strict audit."
  default_prompt: "Use $quant-research to classify this MT5 FX task, then enforce phase-appropriate gates, new-version file/context isolation, strict audit status, replay determinism, cleanup, and evidence labels."
metadata:
  version: "1.6.0"
  purpose: "Support fast exploratory strategy research without governance drag while preserving decision-grade controls for candidate versions, strict audit enforcement, copied active-Python version isolation, context reset, file cleanup, MTF/pivot timing safety, OOS boundaries, bar-by-bar replay determinism, and MT5 dry-run/demo runtime handoff."
  applies_to:
    - "exploratory alpha hypothesis testing"
    - "quick strategy coding and fatal audit"
    - "strict audit enforcement and minimal safety patches"
    - "future-function and lookahead repair"
    - "phase-appropriate lightweight versus strict gates"
    - "new-version active Python file copying"
    - "new thread or context handoff for version iteration"
    - "temporary and invalid file cleanup"
    - "win-rate and risk-reward testing"
    - "MFE/MAE and winner/loss attribution"
    - "MT5 OHLC and tick research"
    - "multi-timeframe timing and lookahead audits"
    - "pivot, swing, structure, fractal and divergence timing integrity"
    - "one-version-one-folder isolation checks"
    - "FX event studies"
    - "strategy backtest reviews"
    - "candidate version iteration"
    - "bar-by-bar replay validation"
    - "batch-vs-incremental replay determinism checks"
    - "market microstructure and liquidity sweep research"
    - "walk-forward and OOS validation"
    - "lookahead and survivorship audits"
    - "cross-version output contamination audits"
    - "strategy attribution and freeze management"
    - "runtime handoff for dry-run/demo EXE packaging"
    - "machine-readable data ledger guards"
    - "frozen baseline registry checks"
    - "research stage gate checks"
    - "Chinese diagnostic research reports"
  excludes:
    - "unlabeled alpha claims"
    - "hidden parameter optimization"
    - "OOS or forward claims from exploratory tests"
    - "decision-grade MTF claims without timing audit"
    - "formal backtests that read sibling-version outputs"
    - "child versions edited directly in parent active files"
    - "version iteration using stale conversation context without handoff"
    - "loose temporary files treated as formal evidence"
    - "broker order placement"
    - "REAL-account trading"
    - "EA live trading code generation"
    - "strategy recommendations without audit evidence"
    - "audit fixes mixed with performance optimization"
    - "strategy logic changes during strict audit mode"
